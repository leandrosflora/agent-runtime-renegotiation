name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install --quiet --disable-pip-version-check -r requirements.txt -r requirements-dev.txt

      - name: Test
        run: |
          set +e
          python -m pytest -q --maxfail=1 > pytest.log 2>&1
          status=$?
          cat pytest.log
          echo "$status" > pytest.exit
          exit "$status"

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: pytest.log
          if-no-files-found: error
